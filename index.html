<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <title>Responsive Navbar</title>

    <style>
        .hero {
            height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">IslandTour</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Packages</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Food</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Book</a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <section class="hero d-flex align-items-center justify-content-center text-center">
        <div class="content">
            <h1 class="display-4 text-white fw-bold">Explore Paradise</h1>
            <p class="lead text-white">Discover unforgettable island experiences</p>
            <a href="#" class="btn btn-light btn-lg mt-3">View Packages</a>
        </div>
    </section>

    <section class="bg-light text-dark text-center py-5">
        <div class="container">
            <blockquote class="blockquote">
                <p class="fs-3 fst-italic mb-4">
                    “Traveling - it leaves you speechless, then turns you into a storyteller.”
                </p>
                <div class="blockquote-footer">
                    Ibn Battuta
                </div>
            </blockquote>
        </div>
    </section>
</body>

</html>
