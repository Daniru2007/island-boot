<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Gallery</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
    }

    .img-box {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .img-box img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 10px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      text-align: center;
      opacity: 0;
      transition: 0.3s;
    }

    .img-box:hover .overlay {
      opacity: 1;
    }

    .glass-navbar {
      background: rgba(255, 255, 255, 0.353);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
  </style>

</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-transparent fixed-top glass-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">IslandTour</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="packages.html">Packages</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="foodanddining.html">Food</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="gallery.html">Gallery</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="activities.html">Activities</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html">Contact</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <div class="container py-5">

    <h1 class="text-center mb-4">Explore Our Island</h1>

    <!-- FILTERS -->
    <div class="text-center mb-4">
      <button class="btn btn-dark filter-btn" data-filter="all">All</button>
      <button class="btn btn-outline-dark filter-btn" data-filter="beach">Beaches</button>
      <button class="btn btn-outline-dark filter-btn" data-filter="villa">Villas</button>
      <button class="btn btn-outline-dark filter-btn" data-filter="activity">Activities</button>
    </div>

    <!-- GALLERY -->
    <div class="row" id="galleryContainer"></div>

    <!-- ADD FORM -->
    <div class="mt-5">
      <h4>Add Image</h4>

      <input id="title" class="form-control mb-2" placeholder="Title">
      <input id="category" class="form-control mb-2" placeholder="Category (beach/villa/activity)">
      <input id="image" class="form-control mb-2" placeholder="Image URL">
      <input id="location" class="form-control mb-2" placeholder="Location">
      <input id="description" class="form-control mb-2" placeholder="Description">

      <button id="addBtn" class="btn btn-success">Add</button>
    </div>

  </div>

  <footer class="bg-dark text-light py-3 ">
    <ul class="nav justify-content-center border-bottom border-secondary pb-3 mb-3">
      <li class="nav-item"><a href="index.html" class="nav-link px-2 text-light">Home</a></li>
      <li class="nav-item"><a href="activities.html" class="nav-link px-2 text-light">Features</a></li>
      <li class="nav-item"><a href="packages.html" class="nav-link px-2 text-light">Pricing</a></li>
      <li class="nav-item"><a href="contact.html" class="nav-link px-2 text-light">FAQs</a></li>
      <li class="nav-item"><a href="gallery.html" class="nav-link px-2 text-light">About</a></li>
    </ul>

    <p class="text-center text-secondary mb-0">
      © 2025 IslandTour, Inc
    </p>
  </footer>
  <script>

    // LOAD ALL
    function loadGallery() {
      $.get("backend/gallery.php", function (data) {

        let html = "";

        data.forEach(item => {
          html += `
      <div class="col-md-4 mb-4 gallery-item ${item.category}">
        <div class="img-box">
          <img src="${item.image}" data-id="${item.id}" class="gallery-img">
          <div class="overlay">
            <strong>${item.title}</strong><br>
            <small>${item.location}</small>
          </div>
        </div>
      </div>`;
        });

        // IMPORTANT → replace content (no duplicates)
        $("#galleryContainer").html(html);
      });
    }

    // CLICK → GET ONE
    $(document).on("click", ".gallery-img", function () {

      let id = $(this).data("id");

      $.get("backend/gallery.php?id=" + id, function (data) {

        alert(`
Title: ${data.title}
Location: ${data.location}
Category: ${data.category}
Description: ${data.description}
Date: ${data.date}
    `);

      });
    });

    // FILTER
    $(document).on("click", ".filter-btn", function () {

      let filter = $(this).data("filter");

      if (filter === "all") {
        $(".gallery-item").show();
      } else {
        $(".gallery-item").hide();
        $("." + filter).show();
      }
    });

    // ADD NEW
    $("#addBtn").click(function () {

      $.post("backend/gallery.php", {
        title: $("#title").val(),
        category: $("#category").val(),
        image: $("#image").val(),
        location: $("#location").val(),
        description: $("#description").val()
      }, function () {

        alert("Added!");

        // RESET FORM
        $("#title").val("");
        $("#category").val("");
        $("#image").val("");
        $("#location").val("");
        $("#description").val("");

        // REFRESH
        loadGallery();

      });
    });

    // INIT
    $(document).ready(function () {
      loadGallery();
    });

  </script>

</body>

</html>
