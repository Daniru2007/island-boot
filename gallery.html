  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gravitas+One&family=Kulim+Park:ital,wght@0,200;0,300;0,400;0,600;0,700;1,200;1,300;1,400;1,600;1,700&family=Oswald:wght@200..700&family=Poiret+One&family=Space+Grotesk:wght@300..700&display=swap');

    body {
      font-family: 'Kulim Park', sans-serif;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'Poiret One', serif;
    }

    /* IMAGE BOX */
    .img-box {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .img-box img {
      width: 100%;
      transition: 0.4s;
      cursor: pointer;
    }

    .img-box:hover img {
      transform: scale(1.1);
    }

    .glass-navbar {
      background: rgba(255, 255, 255, 0.353);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    /* OVERLAY TEXT */
    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      text-align: center;
      padding: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    .img-box:hover .overlay {
      opacity: 1;
    }

    /* FILTER BUTTONS */
    .filter-btn {
      margin: 5px;
    }

    .filter-btn.active {
      background: black;
      color: white;
    }
  </style>

</head>

<body>

            <li class="nav-item">

            </li>
            <li class="nav-item">

    <h1 class="text-center mb-4 fw-bold" style="padding-top: 60px; padding-bottom: 50px;">Explore Our Island</h1>

      <div class="col-md-4 mb-4 gallery-item beach">

      <!-- VILLA -->

  <!-- MODAL -->

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // FILTER
    const buttons = document.querySelectorAll(".filter-btn");
    const items = document.querySelectorAll(".gallery-item");

    buttons.forEach(btn => {
      btn.addEventListener("click", () => {

        buttons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        let filter = btn.getAttribute("data-filter");

        items.forEach(item => {
          if (filter === "all" || item.classList.contains(filter)) {
            item.style.display = "block";
          } else {
            item.style.display = "none";
          }
        });
      });
    });

    // MODAL IMAGE VIEW
    document.querySelectorAll(".img-box img").forEach(img => {
      img.addEventListener("click", () => {
        document.getElementById("modalImg").src = img.src;
        new bootstrap.Modal(document.getElementById("galleryModal")).show();
      });
    });
  </script>
