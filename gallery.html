<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Gallery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kulim+Park&family=Poiret+One&display=swap');

    body {
      font-family: 'Kulim Park', sans-serif;
    }

    h1, h2, h3 {
      font-family: 'Poiret One', serif;
    }

    .img-box {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .img-box img {
      width: 100%;
      transition: 0.4s;
      cursor: pointer;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: white;
      text-align: center;
      padding: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    .img-box:hover .overlay {
      opacity: 1;
    }

    .filter-btn {
      margin: 5px;
    }

    .filter-btn.active {
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<div class="container py-5">

  <h1 class="text-center mb-4 fw-bold">Explore Our Island</h1>

  <!-- FILTER BUTTONS -->
  <div class="text-center mb-4">
    <button class="btn btn-dark filter-btn active" data-filter="all">All</button>
    <button class="btn btn-outline-dark filter-btn" data-filter="beach">Beaches</button>
    <button class="btn btn-outline-dark filter-btn" data-filter="villa">Villas</button>
    <button class="btn btn-outline-dark filter-btn" data-filter="activity">Activities</button>
  </div>

  <!-- GALLERY -->
  <div class="row">

    <div class="col-md-4 mb-4 gallery-item beach">
      <div class="img-box">
        <img src="assests/jakob-owens-2uuT1mmxnz0-unsplash.jpg">
        <div class="overlay">Beautiful Beach</div>
      </div>
    </div>

    <div class="col-md-4 mb-4 gallery-item villa">
      <div class="img-box">
        <img src="assests/michael-DXQB5D1njMY-unsplash.jpg">
        <div class="overlay">Luxury Villa</div>
      </div>
    </div>

    <div class="col-md-4 mb-4 gallery-item activity">
      <div class="img-box">
        <img src="assests/beautiful-girl-red-bikini-boat-koh-kai-island-thailand.jpg">
        <div class="overlay">Water Sports</div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div id="galleryModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8);">
  <img id="modalImg" style="display:block; max-width:80%; margin:5% auto;">
</div>

<!-- <--jquery part--> -->
<script>
$(document).ready(function(){

  // HTML EVENTS
  $(".filter-btn").click(function(){

    //  CSS MANIPULATION
    $(".filter-btn").removeClass("active").css("background","");
    $(this).addClass("active").css("background","black");

    let filter = $(this).data("filter");

    //  DOM MODIFICATION
    if(filter == "all"){
      $(".gallery-item").fadeIn();
    } else {
      $(".gallery-item").hide();
      $("." + filter).fadeIn();
    }

  });

  //  JAVASCRIPT EFFECTS
  $(".img-box").hover(function(){
    $(this).find("img").css("transform","scale(1.15)");
  }, function(){
    $(this).find("img").css("transform","scale(1)");
  });

  //  DOM ATTRIBUTE MODIFICATION
  $(".img-box img").click(function(){
    let imgSrc = $(this).attr("src");
    $("#modalImg").attr("src", imgSrc);
    $("#galleryModal").fadeIn();
  });

  // Close modal
  $("#galleryModal").click(function(){
    $(this).fadeOut();
  });

  // DOM TRAVERSAL
  $(".img-box img").click(function(){
    let text = $(this).siblings(".overlay").text();
    console.log("Image clicked:", text);
  });

});
</script>

</body>
</html>
