<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Gallery</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body {
      font-family: sans-serif;
    }

    .img-box {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
    }

    .img-box img {
      width: 100%;
      cursor: pointer;
    }

    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: white;
      text-align: center;
      opacity: 0;
      transition: 0.3s;
    }

    .img-box:hover .overlay {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">Explore Our Island</h1>

<!-- filters -->
<div class="text-center mb-4">
  <button class="btn btn-dark filter-btn active" data-filter="all">All</button>
  <button class="btn btn-outline-dark filter-btn" data-filter="beach">Beaches</button>
  <button class="btn btn-outline-dark filter-btn" data-filter="villa">Villas</button>
  <button class="btn btn-outline-dark filter-btn" data-filter="activity">Activities</button>
</div>

<!-- buttons -->
<div class="text-center mb-4">
  <button id="changeTitle" class="btn btn-primary">Translate</button>
  <button id="colorBtn" class="btn btn-success">Dark</button>
  <button id="fadeBtn" class="btn btn-warning">Fade</button>
</div>

<div class="row">

  <div class="col-md-4 mb-4 gallery-item beach">
    <div class="img-box">
      <img src="assests/jakob-owens-2uuT1mmxnz0-unsplash.jpg">
      <div class="overlay">Beautiful Beach</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item beach">
    <div class="img-box">
      <img src="assests/jakob-owens-U7DePI_oKNY-unsplash.jpg">
      <div class="overlay">Sunset Beach</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item villa">
    <div class="img-box">
      <img src="assests/michael-DXQB5D1njMY-unsplash.jpg">
      <div class="overlay">Luxury Villa</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item villa">
    <div class="img-box">
      <img src="assests/cris-tagupa-9ZXHUr5aCwM-unsplash.jpg">
      <div class="overlay">Ocean View Villa</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item activity">
    <div class="img-box">
      <img src="assests/beautiful-girl-red-bikini-boat-koh-kai-island-thailand.jpg">
      <div class="overlay">Water Sports</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item activity">
    <div class="img-box">
      <img src="assests/Beach Dining.jpg">
      <div class="overlay">Snorkeling</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item beach">
    <div class="img-box">
      <img src="assests/004.png">
      <div class="overlay">Island Wildlife</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item beach">
    <div class="img-box">
      <img src="assests/003.png">
      <div class="overlay">Island View</div>
    </div>
  </div>

  <div class="col-md-4 mb-4 gallery-item beach">
    <div class="img-box">
      <img src="assests/0001.jpg">
      <div class="overlay">Shoreline</div>
    </div>
  </div>

</div>

<!-- ajax -->
<div class="mt-5">
  <h3>Manage Data</h3>

  <input id="name" placeholder="Name" class="form-control mb-2">
  <input id="email" placeholder="Email" class="form-control mb-2">
  <input id="age" placeholder="Age" class="form-control mb-2">
  <input id="city" placeholder="City" class="form-control mb-2">
  <input id="phone" placeholder="Phone" class="form-control mb-2">

  <button id="addRecord" class="btn btn-success mb-2">Add</button>

  <input id="searchId" placeholder="Search ID" class="form-control mb-2">
  <button id="getOne" class="btn btn-primary mb-2">Get One</button>
  <button id="getAll" class="btn btn-dark mb-2">Get All</button>

  <pre id="output"></pre>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
$(document).ready(function(){

  // FILTER
  $(".filter-btn").click(function(){
    let filter = $(this).data("filter");
    $(".gallery-item").hide();
    if(filter==="all") $(".gallery-item").show();
    else $("."+filter).show();
  });

  $("#changeTitle").click(function(){
    $("h1").text("Explora Nuestra Isla");
  });

  $("#colorBtn").click(function(){
    $("body").css("background","#6a6a6b");
  });

  $("#fadeBtn").click(function(){
    $(".gallery-item").fadeToggle();
  });

  // AJAX
  $("#getAll").click(function(){
    $.get("gallery.php", function(data){
      $("#output").text(JSON.stringify(data,null,2));
    });
  });

  $("#getOne").click(function(){
    let id=$("#searchId").val();
    $.get("gallery.php?id="+id, function(data){
      $("#output").text(JSON.stringify(data,null,2));
    });
  });

  $("#addRecord").click(function(){
    $.post("gallery.php",{
      name:$("#name").val(),
      email:$("#email").val(),
      age:$("#age").val(),
      city:$("#city").val(),
      phone:$("#phone").val()
    }, function(res){
      alert(res.message);
    });
  });

});
</script>

</body>
</html>
