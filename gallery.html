<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Island Gallery</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
      font-family: Arial, sans-serif;
    }

    h2 {
      font-weight: bold;
    }

    /* IMAGE BOX */
    .img-box {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .img-box img {
      width: 100%;
      transition: 0.4s;
      cursor: pointer;
    }

    .img-box:hover img {
      transform: scale(1.1);
    }

    /* OVERLAY TEXT */
    .overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: white;
      text-align: center;
      padding: 10px;
      opacity: 0;
      transition: 0.3s;
    }

    .img-box:hover .overlay {
      opacity: 1;
    }

    /* FILTER BUTTONS */
    .filter-btn {
      margin: 5px;
    }

    .filter-btn.active {
      background: black;
      color: white;
    }
  </style>

</head>

<body>

<div class="container py-5">

  <h2 class="text-center mb-4">Explore Our Island</h2>

  <!-- FILTER BUTTONS -->
  <div class="text-center mb-4">
    <button class="btn btn-dark filter-btn active" data-filter="all">All</button>
    <button class="btn btn-outline-dark filter-btn" data-filter="beach">Beaches</button>
    <button class="btn btn-outline-dark filter-btn" data-filter="villa">Villas</button>
    <button class="btn btn-outline-dark filter-btn" data-filter="activity">Activities</button>
  </div>

  <!-- GALLERY -->
  <div class="row">

    <!-- BEACH -->
    <div class="col-md-4 mb-4 gallery-item beach">
      <div class="img-box">
        <img src="c:\Users\HP\Downloads\mariola-grobelska-Z_LkTUshc6o-unsplash.jpg">
        <div class="overlay">Beautiful Beach</div>
      </div>
    </div>

    <div class="col-md-4 mb-4 gallery-item beach">
      <div class="img-box">
        <img src="c:\Users\HP\Downloads\kikki-starr-FQQO4iQTXYY-unsplash.jpg">
        <div class="overlay">Sunset Beach</div>
      </div>
    </div>

    <!-- VILLA -->
    <div class="col-md-4 mb-4 gallery-item villa">
      <div class="img-box">
        <img src="c:\Users\HP\Downloads\antonio-araujo-aXyuv9rBejE-unsplash.jpg">
        <div class="overlay">Luxury Villa</div>
      </div>
    </div>

    <div class="col-md-4 mb-4 gallery-item villa">
      <div class="img-box">
        <img src="c:\Users\HP\Downloads\sandip-roy-jEx-gDIB0CI-unsplash.jpg">
        <div class="overlay">Ocean View Villa</div>
      </div>
    </div>

    <!-- ACTIVITY -->
    <div class="col-md-4 mb-4 gallery-item activity">
      <div class="img-box">
        <img src="c:\Users\HP\Downloads\ludovic-gauthier-AZijeluagac-unsplash.jpg">
        <div class="overlay">Water Sports</div>
      </div>
    </div>

    <div class="col-md-4 mb-4 gallery-item activity">
      <div class="img-box">
        <img src="c:\Users\HP\OneDrive\Pictures\bwg8wmcrubrjjgjaecys.jpg">
        <div class="overlay">Snorkeling</div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="galleryModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <img id="modalImg" class="w-100">
    </div>
  </div>
</div>

<!-- jQuery first -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

  $(".filter-btn").click(function(){
    $(".filter-btn").removeClass("active");
    $(this).addClass("active");

    let filter = $(this).data("filter");

    if(filter == "all"){
      $(".gallery-item").fadeIn();
    } else {
      $(".gallery-item").hide();
      $("." + filter).fadeIn();
    }
  });

  $(".img-box img").click(function(){
    let imgSrc = $(this).attr("src");
    $("#modalImg").attr("src", imgSrc);
    $("#galleryModal").fadeIn();

    let text = $(this).siblings(".overlay").text();
    console.log("Image clicked:", text);
  });

  $("#galleryModal").click(function(){
    $(this).fadeOut();
  });

});
</script>

</body>
</html>
