<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Food & Dining</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: 'Kulim Park', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Poiret One', serif;
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h1 class="text-center mb-4">Food & Dining</h1>

        <p class="text-center mb-4">
            Enjoy delicious meals and amazing dining experiences on our island.
        </p>

        <!-- FOOD GRID -->
        <div class="row" id="foodContainer"></div>

        <!-- ADD FORM -->
        <div class="container mt-5">
            <h4>Add New Food Item</h4>

            <input id="title" class="form-control mb-2" placeholder="Food Name">
            <input id="category" class="form-control mb-2" placeholder="Category (local/drink/dining)">
            <input id="image" class="form-control mb-2" placeholder="Image URL">
            <input id="price" class="form-control mb-2" placeholder="Price">
            <input id="availability" class="form-control mb-2" placeholder="Availability">
            <textarea id="description" class="form-control mb-2" placeholder="Description"></textarea>

            <button id="addFood" class="btn btn-success w-100">Add Food</button>
        </div>

    </div>

    <script>

        /* =========================
           LOAD FOOD ITEMS
        ========================= */
        function loadFood() {

            $.get("backend/food.php", function (data) {

                let html = "";

                data.forEach(item => {

                    html += `
            <div class="col-md-3 mb-4">
                <div class="card shadow-sm">
                    <img src="${item.image}" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">${item.title}</h5>
                        <p class="card-text">${item.description}</p>
                        <p><strong>${item.price}</strong></p>
                        <p class="${item.availability === 'Available' ? 'text-success' : 'text-danger'}">
                            ${item.availability}
                        </p>
                    </div>
                </div>
            </div>
            `;
                });

                $("#foodContainer").html(html);
            });
        }

        /* =========================
           ADD FOOD ITEM
        ========================= */
        $("#addFood").click(function () {

            $.post("backend/food.php", {
                title: $("#title").val(),
                category: $("#category").val(),
                image: $("#image").val(),
                price: $("#price").val(),
                availability: $("#availability").val(),
                description: $("#description").val()
            }, function () {

                alert("Food Added");

                // $("#title").val("");
                // $("#category").val("");
                // $("#image").val("");
                // $("#price").val("");
                // $("#availability").val("");
                // $("#description").val("");

                loadFood();
            });
        });

        /* INIT */
        $(document).ready(function () {
            loadFood();
        });

    </script>

</body>

</html>
