<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Food & Dining</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: 'Kulim Park', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Poiret One', serif;
        }

        .card img {
            height: 200px;
            object-fit: cover;
        }

        @import url('https://fonts.googleapis.com/css2?family=Gravitas+One&family=Kulim+Park:ital,wght@0,200;0,300;0,400;0,600;0,700;1,200;1,300;1,400;1,600;1,700&family=Oswald:wght@200..700&family=Poiret+One&family=Space+Grotesk:wght@300..700&display=swap');

        body {
            font-family: 'Kulim Park', sans-serif;
            background: linear-gradient(135deg, #e8f5f9 0%, #f1f8e9 50%, #fff9e6 100%);
            min-height: 100vh;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: 'Poiret One', serif;
        }

        .glass-navbar {
            background: rgba(255, 255, 255, 0.353);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .card {
            transition: background-color 0.3s ease;
        }


        .glass-form {
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-transparent fixed-top glass-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">IslandTour</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="packages.html">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="foodanddining.html">Food</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="activities.html">Activities</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container py-5">

        <h1 class="text-center mb-4" style="padding-top: 8px;">Food & Dining</h1>

        <p class="text-center mb-4">
            Enjoy delicious meals and amazing dining experiences on our island.
        </p>

        <!-- FOOD GRID -->
        <div class="row" id="foodContainer"></div>

        <!-- ADD FORM -->
        <div class="container mt-5">
            <h4>Add New Food Item</h4>

            <input id="title" class="form-control mb-2" placeholder="Food Name">
            <input id="category" class="form-control mb-2" placeholder="Category (local/drink/dining)">
            <input id="image" class="form-control mb-2" placeholder="Image URL">
            <input id="price" class="form-control mb-2" placeholder="Price">
            <input id="availability" class="form-control mb-2" placeholder="Availability">
            <textarea id="description" class="form-control mb-2" placeholder="Description"></textarea>

            <button id="addFood" class="btn btn-success w-100">Add Food</button>
        </div>

    </div>

    <script>

        /* =========================
           LOAD FOOD ITEMS
        ========================= */
        function loadFood() {

            $.get("backend/food.php", function (data) {

                let html = "";

                data.forEach(item => {

                    html += `
            <div class="col-md-3 mb-4">
                <div class="card shadow-sm">
                    <img src="${item.image}" class="card-img-top">
                    <div class="card-body">
                        <h5 class="card-title">${item.title}</h5>
                        <p class="card-text">${item.description}</p>
                        <p><strong>${item.price}</strong></p>
                        <p class="${item.availability === 'Available' ? 'text-success' : 'text-danger'}">
                            ${item.availability}
                        </p>
                    </div>
                </div>
            </div>
            `;
                });

                $("#foodContainer").html(html);
            });
        }

        /* =========================
           ADD FOOD ITEM
        ========================= */
        $("#addFood").click(function () {

            $.post("backend/food.php", {
                title: $("#title").val(),
                category: $("#category").val(),
                image: $("#image").val(),
                price: $("#price").val(),
                availability: $("#availability").val(),
                description: $("#description").val()
            }, function () {

                alert("Food Added");

                // $("#title").val("");
                // $("#category").val("");
                // $("#image").val("");
                // $("#price").val("");
                // $("#availability").val("");
                // $("#description").val("");

                loadFood();
            });
        });

        /* INIT */
        $(document).ready(function () {
            loadFood();
        });

    </script>

</body>

</html>
