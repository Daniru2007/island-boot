<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity | CRUD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/@imacrayon/alpine-ajax@0.12.7/dist/cdn.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
<main>

    <!-- 🔹 TOPIC -->
    <div class="container mt-3 text-center bg-light p-5 rounded">
        <h1 style="font-family: 'Poiret One', serif;">CRUD Activities</h1>
        <p class="lead">Manage your activities with ease by adding, editing them at any time.</p>
    </div>


    <div class="container mt-5">
        <div class="row">

            <!--  ADD SECTION  -->
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-4 text-primary">Add New Activity</h2>

                    <form action="add_activity.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Activity Name</label>
                            <input type="text" class="form-control" name="activityName" required>

                            <label class="form-label mt-2">Activity Description</label>
                            <textarea class="form-control" name="activityDescription" rows="3"></textarea>

                            <label class="form-label mt-2">Activity Type</label>
                            <select class="form-control" name="activityType">
                                <option value="Adventure">Adventure</option>
                                <option value="Cultural">Cultural</option>
                                <option value="Event">Event</option>
                                <option value="Nature">Nature</option>
                                <option value="Food">Food</option>
                            </select>

                            <label class="form-label mt-2">Activity Price</label>
                            <input type="number" class="form-control" name="activityPrice" step="0.01" required>
                       
                            <label class="form-label mt-2">Activity Discount</label>
                            <input type="number" class="form-control" name="activityDiscount" step="0.01">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Add Activity</button>
                    </form>
                </div>
            </div>

            <!--  UPDATE SECTION -->
            <div class="col-md-6">
                <div class="card p-4 shadow-sm">
                    <h2 class="mb-4 text-warning">Update Activity</h2>

                    <form action="update_activity.php" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Activity ID</label>
                            <input type="number" class="form-control" name="activityId" required>

                            <label class="form-label mt-2">Activity Name</label>
                            <input type="text" class="form-control" name="activityName">

                            <label class="form-label mt-2">Activity Description</label>
                            <textarea class="form-control" name="activityDescription" rows="3"></textarea>

                            <label class="form-label mt-2">Activity Type</label>
                            <select class="form-control" name="activityType">
                                <option value="Adventure">Adventure</option>
                                <option value="Cultural">Cultural</option>
                                <option value="Event">Event</option>
                                <option value="Nature">Nature</option>
                                <option value="Food">Food</option>
                            </select>

                            <label class="form-label mt-2">Activity Price</label>
                            <input type="number" class="form-control" name="activityPrice" step="0.01">
                        
                            <label class="form-label mt-2">Activity Discount</label>
                            <input type="number" class="form-control" name="activityDiscount" step="0.01">

                        
                        </div>

                        <button type="submit" class="btn btn-warning w-100">Update Activity</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

</main>

<script>
    $(document).ready(function() {
    // Single function to handle both Add and Update forms
    $('form').on('submit', function(e) {
        e.preventDefault();
        
        let formData = $(this).serialize(); // Grabs all inputs automatically

        $.ajax({
            url: 'backend/activity.php',
            type: 'POST',
            data: formData,
            success: function(response) {
                alert(response.message);
                location.reload(); // Refresh to see changes
            },
            error: function() {
                alert("Error connecting to server.");
            }
        });
    });
});
</script>
</body>
</html>
